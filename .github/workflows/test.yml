name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Cache Go build cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: go-build-${{ runner.os }}-

      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Files not formatted with gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Install and run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npx eslint frontend/app.js
      - name: Stylelint
        run: npx stylelint "frontend/*.css"
      - name: CSS variable validation
        run: bash scripts/check-css-vars.sh

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Run frontend smoke tests
        run: node frontend/test-markdown-patch.mjs

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Check Nix package build
        run: ./scripts/check-nix-build.sh

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Cache Go build cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: go-build-${{ runner.os }}-

      - name: Run tests with coverage
        run: |
          PKGS=$(go list ./... | grep -v /node_modules/)
          go test -coverprofile=coverage.out -covermode=atomic $PKGS

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}

  unit-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Cache Go build cache
        uses: actions/cache@v5
        with:
          path: ~/AppData/Local/go-build
          key: go-build-${{ runner.os }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: go-build-${{ runner.os }}-

      - name: Run tests
        run: go test ./...

      # Some tests spawn `crit.exe` daemons that may outlive the test process
      # by a few seconds (background goroutines, deferred file flushes). If
      # they're still alive when actions/setup-go's post step packs the cache
      # tar, the cache step fails because the binary is locked. Kill any
      # leftover processes before the implicit post-cache step runs.
      - name: Kill leftover crit daemons
        if: always()
        shell: cmd
        run: taskkill /F /IM crit.exe /T 2>nul || exit /b 0

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Cache Go build cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: go-build-${{ runner.os }}-

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install npm dependencies
        working-directory: e2e
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: e2e
        run: npx playwright install chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: e2e
        run: npx playwright install-deps chromium

      - name: Build crit with coverage instrumentation
        run: |
          mkdir -p /tmp/crit-coverdir
          go build -cover -o /tmp/crit-cover-bin .

      - name: Run E2E tests
        working-directory: e2e
        run: bash run.sh
        env:
          CRIT_BIN: /tmp/crit-cover-bin
          GOCOVERDIR: /tmp/crit-coverdir

      - name: Convert E2E coverage data
        if: always()
        run: |
          if [ -d /tmp/crit-coverdir ] && ls /tmp/crit-coverdir/*.* >/dev/null 2>&1; then
            go tool covdata textfmt -i=/tmp/crit-coverdir -o=e2e-coverage.out
          fi

      - name: Upload E2E coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: e2e-coverage.out
          flags: e2e
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: e2e/test-results/
          retention-days: 7

  e2e-windows:
    runs-on: windows-latest
    env:
      # Stop Git Bash from auto-converting POSIX-looking arguments to Windows
      # paths when invoking native binaries (crit.exe, taskkill, powershell).
      MSYS_NO_PATHCONV: 1
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Cache Go build cache
        uses: actions/cache@v5
        with:
          path: ~/AppData/Local/go-build
          key: go-build-${{ runner.os }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: go-build-${{ runner.os }}-

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install npm dependencies
        working-directory: e2e
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/AppData/Local/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: e2e
        run: npx playwright install chromium

      - name: Build crit with coverage instrumentation
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/crit-coverdir"
          go build -cover -o crit-cover-bin.exe .

      - name: Run E2E tests
        working-directory: e2e
        shell: bash
        run: bash run.sh
        env:
          CRIT_BIN: ${{ github.workspace }}/crit-cover-bin.exe
          GOCOVERDIR: ${{ runner.temp }}/crit-coverdir

      - name: Convert E2E coverage data
        if: always()
        shell: bash
        run: |
          if [ -d "${RUNNER_TEMP}/crit-coverdir" ] && ls "${RUNNER_TEMP}"/crit-coverdir/*.* >/dev/null 2>&1; then
            go tool covdata textfmt -i="${RUNNER_TEMP}/crit-coverdir" -o=e2e-coverage.out
          fi

      - name: Upload E2E coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: e2e-coverage.out
          flags: e2e
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results-windows
          path: e2e/test-results/
          retention-days: 7

      # Some tests spawn `crit.exe` daemons that may outlive the test process
      # by a few seconds. If they're still alive when actions/setup-* post
      # steps pack their caches, the cache step fails because the binary is
      # locked. Kill any leftover processes before the implicit post-cache
      # steps run. Mirrors the unit-windows job pattern.
      - name: Kill leftover crit daemons
        if: always()
        shell: cmd
        run: taskkill /F /IM crit.exe /T 2>nul || exit /b 0
